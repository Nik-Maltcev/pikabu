# Railway deployment config
# Деплой: создай два сервиса в Railway — backend и frontend
# Плюс PostgreSQL addon

# Backend service:
#   Root Directory: backend
#   Start Command: uvicorn app.main:app --host 0.0.0.0 --port $PORT
#
# Environment variables (задать в Railway dashboard):
#   DATABASE_URL=<из Railway PostgreSQL addon>
#   GEMINI_API_KEY=<твой ключ>
#   CORS_ORIGINS=https://your-frontend.up.railway.app
#   PIKABU_PROXY_URL=socks5://user:pass@your-rf-proxy:port
#
# Frontend service:
#   Root Directory: frontend
#   Build Command: npm ci && npm run build
#   Start Command: npx serve dist -s -l $PORT
#
# Или используй Dockerfile для каждого сервиса
